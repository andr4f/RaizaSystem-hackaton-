spring.application.name=magdalena-agro-trace

# datasource
spring.datasource.url=jdbc:postgresql://localhost:5434/magdalena_trace_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# jpa
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# server
server.port=8082

# jwt
security.jwt.secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_AT_LEAST_256_BITS
security.jwt.expiration-seconds=86400

# cors
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8082

# groq
groq.api.key=${GROQ_API_KEY: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}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile
