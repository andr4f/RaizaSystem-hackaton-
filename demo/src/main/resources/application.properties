spring.application.name=magdalena-agro-trace
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# datasource
spring.datasource.url=jdbc:postgresql://localhost:5434/magdalena_trace_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# jpa
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# server (local: 8082 — Railway inyecta PORT en prod)
server.port=${PORT:8082}

# jwt
security.jwt.secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_AT_LEAST_256_BITS
security.jwt.expiration-seconds=86400
    
# cors
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8082

# groq — en local: application-local.properties | en prod: GROQ_API_KEY en Railway
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile
# pdf storage
app.pdf.storage-path=./generated-pdfs
